<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Request Money</title>
</head>

<body>
    <section th:fragment="content">
        <div style="max-width:560px;margin:0 auto;">
            <div class="card fade-in">
                <div class="card-header">
                    <h2 class="card-title">📨 Request Money</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/requests/send}" method="post"><div class="form-group">
                            <label class="form-label">Request From (username / email / phone)</label>
                            <input type="text" name="requestee" class="form-control"
                                placeholder="Enter username, email or phone" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Amount (₹)</label>
                            <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01"
                                min="1" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Purpose (optional)</label>
                            <input type="text" name="purpose" class="form-control"
                                placeholder="e.g. Rent, Dinner, etc.">
                        </div>
                        <div class="flex gap-12">
                            <a th:href="@{/dashboard}" class="btn btn-outline w-full"
                                style="justify-content:center;">Cancel</a>
                            <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">Send
                                Request 📨</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
