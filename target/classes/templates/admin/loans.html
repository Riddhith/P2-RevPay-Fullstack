<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Loan Approvals</title>
</head>

<body>
    <section th:fragment="content">
        <main>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 style="font-size:2rem; font-weight:700; color:var(--text-primary);">Loan Approvals</h2>
                <span class="badge" style="background:var(--accent-amber);color:black;" th:text="${#lists.size(pendingLoans)} + ' Pending'">0 Pending</span>
            </div>

            <div class="card shadow-sm fade-in">
                <div class="card-header" style="background:var(--bg-secondary);">
                    <h3 class="card-title">Loans Awaiting Approval</h3>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Applicant</th>
                                    <th>Amount</th>
                                    <th>Purpose</th>
                                    <th>Tenure (Mos)</th>
                                    <th style="text-align:right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(pendingLoans)}">
                                    <td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px;">No pending loan applications.</td>
                                </tr>
                                <tr th:each="loan : ${pendingLoans}">
                                    <td th:text="${loan.applicantName}"></td>
                                    <td th:text="${'₹' + #numbers.formatDecimal(loan.loanAmount, 1, 2)}"></td>
                                    <td th:text="${loan.purpose}"></td>
                                    <td th:text="${loan.tenureMonths}"></td>
                                    <td style="text-align:right;">
                                        <form th:action="@{/admin/approve-loan/{id}(id=${loan.loanId})}" method="post" style="display:inline;">
                                            <input type="hidden" name="action" value="approve">
                                            <button type="submit" class="btn btn-sm" style="background:var(--accent-green);color:white;margin-right:8px;border:none;">Approve</button>
                                        </form>
                                        <form th:action="@{/admin/approve-loan/{id}(id=${loan.loanId})}" method="post" style="display:inline;">
                                            <input type="hidden" name="action" value="reject">
                                            <button type="submit" class="btn btn-sm" style="background:var(--accent-red);color:white;border:none;">Reject</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </section>
</body>
</html>
