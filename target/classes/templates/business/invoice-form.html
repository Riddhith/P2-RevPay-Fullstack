<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Create Invoice</title>
</head>

<body>
    <section th:fragment="content">
        <div style="max-width:800px;margin:0 auto;">
            <div class="card fade-in">
                <div class="card-header">
                    <h2 class="card-title">🧾 New Invoice</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/business/invoices/create}" method="post"><!-- Customer Info -->
                        <p class="text-muted text-sm mb-16">Customer Details</p>
                        <div class="form-row cols-2">
                            <div class="form-group">
                                <label class="form-label">Customer Name</label>
                                <input type="text" name="customerName" class="form-control" placeholder="Full Name"
                                    required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Customer Email</label>
                                <input type="email" name="customerEmail" class="form-control"
                                    placeholder="email@example.com">
                            </div>
                        </div>
                        <div class="form-row cols-2">
                            <div class="form-group">
                                <label class="form-label">Customer Address</label>
                                <input type="text" name="customerAddress" class="form-control"
                                    placeholder="Street, City">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Payment Terms</label>
                                <select name="paymentTerms" class="form-control">
                                    <option>Net 7</option>
                                    <option>Net 15</option>
                                    <option selected>Net 30</option>
                                    <option>Net 60</option>
                                    <option>Due on receipt</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row cols-2">
                            <div class="form-group">
                                <label class="form-label">Due Date</label>
                                <input type="date" name="dueDate" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <select name="status" class="form-control">
                                    <option value="DRAFT">Draft</option>
                                    <option value="SENT">Send Immediately</option>
                                </select>
                            </div>
                        </div>

                        <hr style="border-color:var(--border);margin:20px 0;">

                        <!-- Invoice Items -->
                        <div class="flex-between mb-16">
                            <p class="text-muted text-sm">Line Items</p>
                            <button type="button" id="add-item-btn" class="btn btn-outline btn-sm">+ Add Item</button>
                        </div>
                        <div id="invoice-items">
                            <!-- Initial row -->
                            <div class="invoice-item-row flex gap-12 mt-8">
                                <input type="text" name="itemDesc" class="form-control" placeholder="Description"
                                    style="flex:3" required>
                                <input type="number" name="itemQty" class="form-control" placeholder="Qty" step="0.01"
                                    min="1" value="1" style="flex:1" oninput="calcItemTotal(this)">
                                <input type="number" name="itemPrice" class="form-control" placeholder="Unit Price"
                                    step="0.01" min="0" style="flex:2" oninput="calcItemTotal(this)">
                                <input type="number" name="itemTax" class="form-control" placeholder="Tax%" step="0.01"
                                    min="0" value="0" style="flex:1" oninput="calcItemTotal(this)">
                                <input type="text" class="form-control item-total" placeholder="Total" style="flex:2"
                                    readonly>
                                <div style="flex:0.5"></div>
                            </div>
                        </div>

                        <!-- Totals -->
                        <div
                            style="text-align:right;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
                            <div class="flex-between" style="justify-content:flex-end;gap:16px;">
                                <span class="text-muted text-sm">Subtotal:</span>
                                <span id="invoice-subtotal" class="font-bold">₹0.00</span>
                            </div>
                            <div class="flex-between" style="justify-content:flex-end;gap:16px;margin-top:4px;">
                                <span class="text-muted text-sm">Tax:</span>
                                <span id="invoice-tax" class="font-bold">₹0.00</span>
                            </div>
                            <div class="flex-between"
                                style="justify-content:flex-end;gap:16px;margin-top:8px;font-size:1.1rem;">
                                <span>Total:</span>
                                <span id="invoice-total" class="font-bold text-success">₹0.00</span>
                            </div>
                        </div>

                        <hr style="border-color:var(--border);margin:20px 0;">

                        <div class="form-group">
                            <label class="form-label">Notes (optional)</label>
                            <textarea name="notes" class="form-control" rows="2"
                                placeholder="Payment instructions, thank you note..."></textarea>
                        </div>

                        <div class="flex gap-12">
                            <a th:href="@{/business/invoices}" class="btn btn-outline w-full"
                                style="justify-content:center;">Cancel</a>
                            <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">Create
                                Invoice 🧾</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
