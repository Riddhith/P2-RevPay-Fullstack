<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Invoice Detail</title>
</head>

<body>
    <section th:fragment="content">
        <div style="max-width:760px;margin:0 auto;">
            <div class="card fade-in">
                <div class="card-header">
                    <h2 class="card-title">🧾 Invoice <span th:text="${invoice.invoiceNumber}"></span></h2>
                    <span
                        th:class="${'badge' + (invoice.status == 'PAID' ? ' badge-success' : invoice.status == 'SENT' ? ' badge-info' : invoice.status == 'DRAFT' ? ' badge-muted' : ' badge-danger')}"
                        th:text="${invoice.status}"></span>
                </div>
                <div class="card-body">
                    <!-- Customer -->
                    <div class="flex-between mb-24">
                        <div>
                            <div class="text-muted text-sm">Bill To</div>
                            <div class="font-bold" th:text="${invoice.customerName}"></div>
                            <div class="text-muted text-sm" th:text="${invoice.customerEmail}"></div>
                            <div class="text-muted text-sm" th:text="${invoice.customerAddress}"></div>
                        </div>
                        <div style="text-align:right;">
                            <div class="text-muted text-sm">Due Date</div>
                            <div class="font-bold"
                                th:text="${invoice.dueDate != null ? #temporals.format(invoice.dueDate,'dd MMM yyyy') : 'N/A'}">
                            </div>
                            <div class="text-muted text-sm">Terms: <span th:text="${invoice.paymentTerms}"></span></div>
                        </div>
                    </div>

                    <!-- Items -->
                    <div class="table-container mb-24">
                        <table>
                            <thead>
                                <tr>
                                    <th>Description</th>
                                    <th>Qty</th>
                                    <th>Unit Price</th>
                                    <th>Tax %</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${invoice.items}">
                                    <td th:text="${item.description}"></td>
                                    <td th:text="${item.quantity}"></td>
                                    <td>₹<span th:text="${#numbers.formatDecimal(item.unitPrice,1,2)}"></span></td>
                                    <td th:text="${item.taxRate != null ? item.taxRate + '%' : '0%'}"></td>
                                    <td class="font-bold">₹<span
                                            th:text="${#numbers.formatDecimal(item.computeLineTotal(),1,2)}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Totals -->
                    <div style="text-align:right;margin-bottom:24px;">
                        <div class="flex-between" style="justify-content:flex-end;gap:20px;">
                            <span class="text-muted">Subtotal</span>
                            <span>₹<span th:text="${#numbers.formatDecimal(invoice.subtotal,1,2)}"></span></span>
                        </div>
                        <div class="flex-between" style="justify-content:flex-end;gap:20px;margin-top:4px;">
                            <span class="text-muted">Tax</span>
                            <span>₹<span th:text="${#numbers.formatDecimal(invoice.taxTotal,1,2)}"></span></span>
                        </div>
                        <div class="flex-between"
                            style="justify-content:flex-end;gap:20px;margin-top:8px;font-size:1.1rem;">
                            <span class="font-bold">Total</span>
                            <span class="font-bold text-success">₹<span
                                    th:text="${#numbers.formatDecimal(invoice.totalAmount,1,2)}"></span></span>
                        </div>
                    </div>

                    <div th:if="${invoice.notes}" class="alert alert-info">📝 <span th:text="${invoice.notes}"></span>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-12">
                        <a th:href="@{/business/invoices}" class="btn btn-outline">← Back</a>
                        <form th:if="${invoice.status == 'DRAFT'}"
                            th:action="@{/business/invoices/{id}/send(id=${invoice.invoiceId})}" method="post"><button type="submit" class="btn btn-primary">📧 Send Invoice</button>
                        </form>
                        <form th:if="${invoice.status == 'SENT'}"
                            th:action="@{/business/invoices/{id}/mark-paid(id=${invoice.invoiceId})}" method="post"><button type="submit" class="btn btn-success">✓ Mark as Paid</button>
                        </form>
                        <form th:action="@{/business/invoices/{id}/delete(id=${invoice.invoiceId})}" method="post"
                            style="margin-left:auto"><button type="submit" class="btn btn-danger" data-confirm="Delete this invoice?">🗑
                                Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
