<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RevPay</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="auth-body">
    <div class="auth-card fade-in" style="max-width: 600px;">
        <div class="auth-header">
            <h1 class="auth-logo">RevPay</h1>
            <p>Create your account</p>
        </div>

        <div class="auth-tabs">
            <a href="/auth/login" class="auth-tab">Sign In</a>
            <a href="/auth/register" class="auth-tab active">Create Account</a>
        </div>

        <div class="auth-form">
            <div style="display:flex;gap:10px;margin-bottom:24px;">
                <a href="/auth/register?type=personal" class="btn" style="flex:1;justify-content:center;"
                    th:classappend="${accountType == null or accountType == 'personal' ? 'btn-primary' : 'btn-outline'}">
                    👤 Personal
                </a>
                <a href="/auth/register?type=business" class="btn" style="flex:1;justify-content:center;"
                    th:classappend="${accountType == 'BUSINESS' or accountType == 'business' ? 'btn-primary' : 'btn-outline'}">
                    🏢 Business
                </a>
            </div>

            <div th:if="${errorMsg}" class="alert alert-danger fade-in">
                ⚠ <span th:text="${errorMsg}"></span>
            </div>

            <form th:action="@{/auth/register}" method="post">
                <input type="hidden" name="accountType" th:value="${accountType != null ? accountType.toUpperCase() : 'PERSONAL'}" />

                <div class="form-row cols-2">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="fullName" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="johndoe" required>
                    </div>
                </div>

                <div class="form-row cols-2">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phone" class="form-control" placeholder="+91 9999999999">
                    </div>
                </div>

                <div class="form-row cols-2">
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" id="reg-password" class="form-control"
                            placeholder="Min 8 characters" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password"
                            required>
                    </div>
                </div>

                <!-- Business-only fields -->
                <div id="business-fields" th:if="${accountType == 'business' or accountType == 'BUSINESS'}"
                    style="border-top:1px solid var(--border);padding-top:20px;margin-top:10px;">
                    <h3 style="font-size:0.9rem;margin-bottom:16px;color:var(--text-secondary);">🏢 Business Information</h3>
                    <div class="form-row cols-2">
                        <div class="form-group">
                            <label class="form-label">Business Name</label>
                            <input type="text" name="businessName" class="form-control" placeholder="ACME Corp">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Business Type</label>
                            <select name="businessType" class="form-control">
                                <option value="">Select Type</option>
                                <option>Sole Proprietorship</option>
                                <option>Partnership</option>
                                <option>Private Limited</option>
                                <option>Public Limited</option>
                                <option>LLP</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row cols-2">
                        <div class="form-group">
                            <label class="form-label">Tax ID Number</label>
                            <input type="text" name="taxId" class="form-control" placeholder="Tax ID Number">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Business Address</label>
                            <input type="text" name="address" class="form-control" placeholder="Street, City, State">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:10px;">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/auth/login">Sign in</a></p>
            </div>
        </div>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
