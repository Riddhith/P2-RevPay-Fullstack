<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - RevPay</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="auth-body">
    <div class="auth-card" style="max-width:480px;text-align:center;">
        <div class="auth-form">
            <div style="font-size:4rem;margin-bottom:16px;" th:text="${status != null and status == 403} ? '🔒' : '⚠'">⚠
            </div>
            <h1 style="font-size:1.5rem;margin-bottom:8px;">
                <span th:if="${status != null}" th:text="${status + ' Error'}">Error</span>
                <span th:unless="${status != null}">Something went wrong</span>
            </h1>
            <p style="color:var(--text-muted);margin-bottom:24px;"
                th:text="${message ?: 'An unexpected error occurred. Please try again.'}">Error message</p>
            <a href="/dashboard" class="btn btn-primary w-full" style="justify-content:center;">← Back to Dashboard</a>
        </div>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
