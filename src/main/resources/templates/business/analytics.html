<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">

<head>
    <title>Business Analytics</title>
</head>

<body>
    <section th:fragment="content">

        <!-- Summary Stats -->
        <div class="stat-grid mb-24">
            <div class="stat-card green">
                <div class="stat-label">Total Received</div>
                <div class="stat-value">₹<span th:text="${#numbers.formatDecimal(totalReceived,1,2)}">0</span></div>
                <span class="stat-icon">📥</span>
            </div>
            <div class="stat-card red">
                <div class="stat-label">Total Sent</div>
                <div class="stat-value">₹<span th:text="${#numbers.formatDecimal(totalSent,1,2)}">0</span></div>
                <span class="stat-icon">📤</span>
            </div>
            <div class="stat-card blue">
                <div class="stat-label">Paid Invoices</div>
                <div class="stat-value">₹<span th:text="${#numbers.formatDecimal(paidInvoices,1,2)}">0</span></div>
                <span class="stat-icon">✓</span>
            </div>
            <div class="stat-card amber">
                <div class="stat-label">Outstanding Invoices</div>
                <div class="stat-value">₹<span th:text="${#numbers.formatDecimal(outstandingInvoices,1,2)}">0</span>
                </div>
                <span class="stat-icon">⏳</span>
            </div>
        </div>

        <div class="form-row cols-2">
            <!-- Invoice Status Chart -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🧾 Invoice Status Breakdown</h2>
                </div>
                <div class="card-body" style="display:flex;justify-content:center;">
                    <canvas id="invoiceChart" width="280" height="280"
                        th:attr="data-labels='[&quot;Paid&quot;,&quot;Sent&quot;,&quot;Draft&quot;,&quot;Cancelled&quot;]',data-values='['+${countPaid}+','+${countSent}+','+${countDraft}+','+${countCancelled}+']'">
                    </canvas>
                </div>
            </div>

            <!-- Recent Invoices -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">📋 Recent Invoices</h2>
                    <a th:href="@{/business/invoices}" class="btn btn-outline btn-sm">View All</a>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Customer</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(invoices)}">
                                <td colspan="3" style="text-align:center;color:var(--text-muted);padding:24px;">No
                                    invoices yet.</td>
                            </tr>
                            <tr th:each="inv,i : ${invoices}" th:if="${i.index < 6}">
                                <td class="text-sm" th:text="${inv.customerName}"></td>
                                <td class="font-bold text-sm">₹<span
                                        th:text="${#numbers.formatDecimal(inv.totalAmount,1,2)}"></span></td>
                                <td>
                                    <span
                                        th:class="${'badge' + (inv.status == 'PAID' ? ' badge-success' : inv.status == 'SENT' ? ' badge-info' : ' badge-muted')}"
                                        th:text="${inv.status}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="form-row cols-2 mt-24">
            <!-- Top Customers -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🌟 Top Customers by Volume</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Customer Name</th>
                                <th>Total Paid Volume</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(topCustomers)}">
                                <td colspan="2" style="text-align:center;color:var(--text-muted);padding:24px;">No paid invoices yet.</td>
                            </tr>
                            <tr th:each="tc : ${topCustomers}">
                                <td class="font-bold text-sm" th:text="${tc['customerName']}"></td>
                                <td class="text-sm" style="color:var(--accent-green);">₹<span th:text="${#numbers.formatDecimal(tc['volume'],1,2)}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Net Position -->
            <div class="card">
                <div class="card-body" style="text-align:center;padding:40px;">
                    <div class="text-muted text-sm mb-16">Net Position (Received - Sent)</div>
                    <div class="stat-value" style="font-size:2.5rem;"
                        th:style="${totalReceived.compareTo(totalSent) >= 0 ? 'color:var(--accent-green)' : 'color:var(--accent-red)'}">
                        ₹<span th:text="${#numbers.formatDecimal(totalReceived.subtract(totalSent).abs(),1,2)}"></span>
                    </div>
                    <div class="badge mt-8"
                        th:class="${totalReceived.compareTo(totalSent) >= 0 ? 'badge badge-success' : 'badge badge-danger'}"
                        th:text="${totalReceived.compareTo(totalSent) >= 0 ? '▲ Net Positive' : '▼ Net Negative'}"></div>
                </div>
            </div>
        </div>

    </section>
</body>

</html>
